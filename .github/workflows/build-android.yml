name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer
          pip install cython==0.29.33

      - name: Build with Buildozer
        run: |
          # This command searches for your spec file and runs buildozer in that folder
          SPEC_PATH=$(find . -name "buildozer.spec" -printf '%h\n' | head -n 1)
          cd "$SPEC_PATH"
          echo "Building in folder: $SPEC_PATH"
          yes | buildozer android debug
        env:
          PATH: /home/runner/.local/bin:$PATH

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ParadiseTradingApp
          path: "*/bin/.apk"
