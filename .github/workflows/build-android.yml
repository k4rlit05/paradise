name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip zip unzip openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: List all files
        run: |
          echo "Project structure:"
          ls -R .

      - name: Show Buildozer Android folders
        run: |
          echo "Buildozer Android platform folder:"
          ls -R /home/runner/.buildozer/android/platform

      - name: Build APK
        run: |
          buildozer android debug
