name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install "buildozer==1.5.0"
          pip install "cython<3"

      - name: Install Android SDK into Buildozer path
        run: |
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BSDK/cmdline-tools

          curl -L https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline.zip
          unzip -q cmdline.zip -d $BSDK/cmdline-tools
          mv $BSDK/cmdline-tools/cmdline-tools $BSDK/cmdline-tools/latest

          SDKMANAGER=$BSDK/cmdline-tools/latest/bin/sdkmanager

          yes | $SDKMANAGER --sdk_root=$BSDK --licenses || true
          $SDKMANAGER --sdk_root=$BSDK "platform-tools"
          $SDKMANAGER --sdk_root=$BSDK "platforms;android-33"
          $SDKMANAGER --sdk_root=$BSDK "build-tools;33.0.2"
          $SDKMANAGER --sdk_root=$BSDK "ndk;25.1.8937393"

          echo "ANDROIDSDK=$BSDK" >> $GITHUB_ENV
          echo "ANDROIDNDK=$BSDK/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "ANDROID_HOME=$BSDK" >> $GITHUB_ENV

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v9

      - name: Build APK
        run: |
          unset ANDROID_NDK ANDROID_NDK_ROOT ANDROID_NDK_LATEST_HOME
          export PATH=$ANDROIDSDK/cmdline-tools/latest/bin:$ANDROIDSDK/platform-tools:$PATH
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paradise-trading-apk
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
