name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip zip unzip openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # First run installs SDK/NDK and prepares environment
      - name: First Buildozer run (to install SDK)
        run: |
          buildozer android debug || true

      - name: Show Buildozer Android folders
        run: |
          echo "Buildozer Android platform folder:"
          ls -R /home/runner/.buildozer/android/platform || echo "Not found"

      # Actual build
      - name: Build APK
        run: |
          buildozer android debug

      # Upload the generated APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paradise-APK
          path: bin/*.apk
