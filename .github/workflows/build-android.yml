name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip zip unzip cython

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build Android APK with full logging
        run: |
          buildozer android debug -v 2>&1 | tee full-build.log
        continue-on-error: true

      - name: Show last part of log
        run: |
          echo "=== LAST 300 LINES OF LOG ==="
          tail -n 300 full-build.log

      - name: Upload complete build log
        uses: actions/upload-artifact@v4
        with:
          name: complete-build-log
          path: full-build.log
          retention-days: 30

      - name: Upload APK if exists
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MyApp
          path: bin/*.apk
          retention-days: 30
