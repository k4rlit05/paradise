name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential libltdl-dev ccache

      - name: Accept Android SDK licenses
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_SDK/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK/licenses/android-sdk-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_SDK/licenses/android-sdk-preview-license
          yes | $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-33" || true
          echo "ANDROIDSDK=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-v6

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paradise-trading-apk
          path: bin/*.apk
          retention-days: 30
