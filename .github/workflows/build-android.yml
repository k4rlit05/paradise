name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip \
            zip unzip \
            autoconf automake libtool pkg-config \
            build-essential \
            libffi-dev libssl-dev \
            liblzma-dev zlib1g-dev \
            cython3

      - name: Install Android SDK + NDK
        run: |
          sudo mkdir -p /usr/lib/android-sdk
          sudo chown $USER:$USER /usr/lib/android-sdk
          yes | sudo apt install -y android-sdk

          sdkmanager --sdk_root=/usr/lib/android-sdk "platform-tools"
          sdkmanager --sdk_root=/usr/lib/android-sdk "platforms;android-33"
          sdkmanager --sdk_root=/usr.lib/android-sdk "build-tools;33.0.2"
          sdkmanager --sdk_root=/usr/lib/android-sdk "ndk;25.1.8937393"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build Android APK
        run: |
          export ANDROIDSDK=/usr/lib/android-sdk
          export ANDROIDNDK=/usr/lib/android-sdk/ndk/25.1.8937393
          export PATH=$PATH:/usr/lib/android-sdk/platform-tools
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: ParadiseTradingApp
          path: bin/*.apk
