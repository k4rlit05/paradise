name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          
          python3 -m pip install --upgrade pip
          python3 -m pip install "cython<3.0" buildozer==1.5.0

      # 🔥 IMPORTANT: clean previous broken builds
      - name: Clean Buildozer cache
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK with Buildozer
        run: |
          export GRADLE_OPTS="-Dorg.gradle.daemon=false"
          buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paradise-app-debug
          path: bin/*.apk
          if-no-files-found: error
