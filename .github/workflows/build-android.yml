name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip zip unzip openjdk-17-jdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: First Buildozer run (to install SDK)
        run: |
          buildozer android debug || true

      - name: Show Buildozer Android folders
        run: |
          echo "SDK root after first run:"
          ls -R /home/runner/.buildozer/android/platform || echo "Not found"
          echo "Home folder:"
          ls -R /home/runner || true

      - name: Build Android APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyApp
          path: bin/*.apk
          retention-days: 30
