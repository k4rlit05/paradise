name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer==1.5.0
          # Gebruik Cython < 3.0 voor betere compatibiliteit met Kivy 2.3.0
          pip install "cython<3.0"

      - name: Build with Buildozer
        # Vertel GitHub om IN de paradise map te werken waar je .spec en main.py staan
        working-directory: paradise
        run: |
          # Accepteer licenties en start de build
          yes | buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paradise-app-debug
          # Buildozer maakt de 'bin' map aan BINNEN de paradise map
          path: paradise/bin/*.apk
          if-no-files-found: error
