name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Using 22.04 for better compatibility with older NDKs
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Date
        id: get-date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      # This caches the build so future builds are much faster
      - name: Buildozer Cache
        uses: actions/cache@v4
        with:
          path: ./.buildozer
          key: buildozer-${{ runner.os }}-${{ steps.get-date.outputs.date }}-${{ hashFiles('buildozer.spec') }}

      - name: Build Android APK with Buildozer
        uses: ArtemSere/buildozer-action@v1
        with:
          buildozer_version: master
          # This command ensures it actually runs the compilation
          command: buildozer android debug
          repository_root: .

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParadiseTradingApp
          # Buildozer puts the output in the bin folder
          path: bin/*.apk
