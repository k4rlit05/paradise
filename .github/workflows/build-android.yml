name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip \
            zip unzip \
            autoconf automake libtool pkg-config \
            build-essential \
            libffi-dev libssl-dev \
            liblzma-dev zlib1g-dev \
            cython3 wget

      - name: Install Android SDK + NDK (manual Google method)
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk

          # Download Google's official command-line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip cmdtools.zip -d temp

          # Create proper folder structure
          mkdir -p cmdline-tools/latest
          mv temp/cmdline-tools/* cmdline-tools/latest/

          # Clean up
          rm -rf temp cmdtools.zip

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          export PATH=$ANDROID_HOME/platform-tools:$PATH

          yes | sdkmanager --licenses

          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"
          sdkmanager "ndk;25.1.8937393"

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build Android APK
        run: |
          export ANDROIDSDK=$HOME/android-sdk
          export ANDROIDNDK=$HOME/android-sdk/ndk/25.1.8937393
          export PATH=$PATH:$ANDROIDSDK/platform-tools
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParadiseTradingApp
          path: bin/*.apk
