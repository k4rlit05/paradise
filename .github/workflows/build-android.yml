name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install "cython<3.0"  # Kivy 2.3.0 werkt vaak stabieler met Cython 0.29.x

      - name: Manual SDK & License Setup
        run: |
          # Dit zorgt dat de SDK op de juiste plek staat voor Buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "8933bad161af917814a4f82cb0832845174914d7\n24333f8a63b6825ea9d5513f8e0b5833d3735936\n3513397330230f8050e5726226c6d04f215d2639\nd5624d8d1199f22f0367098e946a48b32e6a97f3\n263b96ad0126a544c95ebd063031120286392398" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "d975f750698565345a0d283dd043e414e0409244" > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      - name: Build with Buildozer
        run: |
          # We gebruiken 'yes' om licenties te accepteren tijdens de build
          yes | buildozer -v android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paradise-app-debug
          path: bin/*.apk
          if-no-files-found: error
